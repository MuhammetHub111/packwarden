# Flatpak manifestosu — yerelde test:
#   flatpak-builder --user --install --force-clean build-dir build-aux/io.github.muhammethub111.Purga.yaml
app-id: io.github.muhammethub111.Purga
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk
command: purga

finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  # GTK4 arayüzü GPU ile çizilir; bu izin olmadan yazılım çizimine
  # düşer ve kaydırma yavaşlar
  - --device=dri
  # Ana sistemdeki paket yöneticilerine erişim için zorunlu köprü.
  # Flathub incelemesinde gerekçesi açıklanmalı (sistem aracı istisnası).
  - --talk-name=org.freedesktop.Flatpak
  # Paket yöneticisi arayüzü: uygulama simgeleri/.desktop dosyaları
  # /usr/share'den okunur, kalıntı temizliği ev dizininde çalışır
  - --filesystem=host

modules:
  - name: bulkuninstaller
    buildsystem: simple
    build-commands:
      - mkdir -p /app/lib/python
      - cp -r src/bulkuninstaller /app/lib/python/
      - install -Dm755 build-aux/launcher.sh /app/bin/purga
      - install -Dm644 data/${FLATPAK_ID}.desktop /app/share/applications/${FLATPAK_ID}.desktop
      - install -Dm644 data/${FLATPAK_ID}.metainfo.xml /app/share/metainfo/${FLATPAK_ID}.metainfo.xml
      - install -Dm644 data/icons/${FLATPAK_ID}.svg /app/share/icons/hicolor/scalable/apps/${FLATPAK_ID}.svg
    sources:
      - type: dir
        path: ..
